<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Conexión Supabase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h3>Test de Conexión con Supabase</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <button class="btn btn-primary" onclick="testConnection()">
                                <i class="fas fa-database me-2"></i>Probar Conexión
                            </button>
                            <button class="btn btn-success ms-2" onclick="testCRUD()">
                                <i class="fas fa-cogs me-2"></i>Probar Operaciones CRUD
                            </button>
                            <button class="btn btn-info ms-2" onclick="testAuth()">
                                <i class="fas fa-user me-2"></i>Probar Autenticación
                            </button>
                        </div>
                        
                        <div id="testResults" class="mt-4">
                            <!-- Los resultados se mostrarán aquí -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/supabase-database.js"></script>
    
    <script>
        // Verificar que Supabase esté inicializado
        function checkSupabaseReady() {
            if (!window.supabaseClient) {
                return 'Supabase client not initialized. Please refresh the page.';
            }
            if (!window.db) {
                return 'Database class not loaded. Please check supabase-database.js';
            }
            return null;
        }

        async function testConnection() {
            const resultsDiv = document.getElementById('testResults');
            
            // Verificar inicialización
            const initError = checkSupabaseReady();
            if (initError) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h5><i class="fas fa-times-circle me-2"></i>Error de Inicialización</h5>
                        <p>${initError}</p>
                        <small>Check console for more details.</small>
                    </div>
                `;
                return;
            }
            
            resultsDiv.innerHTML = '<div class="alert alert-info">Probando conexión...</div>';
            
            try {
                const result = await window.db.testConnection();
                
                if (result.success) {
                    resultsDiv.innerHTML = `
                        <div class="alert alert-success">
                            <h5><i class="fas fa-check-circle me-2"></i>Conexión Exitosa</h5>
                            <p>${result.message}</p>
                            <small>URL: ${window.SUPABASE_CONFIG.url}</small>
                        </div>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="alert alert-danger">
                            <h5><i class="fas fa-times-circle me-2"></i>Error de Conexión</h5>
                            <p>${result.error}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h5><i class="fas fa-exclamation-triangle me-2"></i>Error</h5>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testCRUD() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<div class="alert alert-info">Probando operaciones CRUD...</div>';
            
            let results = [];
            
            try {
                // Test 1: Obtener usuarios
                const usuariosResult = await window.db.getUsuarios();
                let usuarioData = '';
                if (usuariosResult.success) {
                    usuarioData = `${usuariosResult.data.length} usuarios activos encontrados (Total: ${usuariosResult.total || 0})`;
                    if (usuariosResult.data.length > 0) {
                        usuarioData += ` - Emails: ${usuariosResult.data.map(u => u.email).join(', ')}`;
                    }
                } else {
                    usuarioData = usuariosResult.error;
                }
                results.push({
                    test: 'Obtener Usuarios',
                    success: usuariosResult.success,
                    data: usuarioData
                });

                // Test 2: Obtener casas de vida
                const casasResult = await window.db.getCasasVida();
                results.push({
                    test: 'Obtener Casas de Vida',
                    success: casasResult.success,
                    data: casasResult.success ? `${casasResult.data.length} casas encontradas` : casasResult.error
                });

                // Test 3: Obtener miembros
                const miembrosResult = await window.db.getMiembros();
                results.push({
                    test: 'Obtener Miembros',
                    success: miembrosResult.success,
                    data: miembrosResult.success ? `${miembrosResult.data.length} miembros encontrados` : miembrosResult.error
                });

                // Test 4: Obtener estadísticas
                const statsResult = await window.db.getEstadisticas();
                results.push({
                    test: 'Obtener Estadísticas',
                    success: statsResult.success,
                    data: statsResult.success ? 'Estadísticas obtenidas correctamente' : statsResult.error
                });

                // Mostrar resultados
                let html = '<h5>Resultados de Tests CRUD:</h5>';
                results.forEach(result => {
                    const alertClass = result.success ? 'alert-success' : 'alert-danger';
                    const icon = result.success ? 'check-circle' : 'times-circle';
                    html += `
                        <div class="alert ${alertClass}">
                            <i class="fas fa-${icon} me-2"></i>
                            <strong>${result.test}:</strong> ${result.data}
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h5><i class="fas fa-exclamation-triangle me-2"></i>Error en CRUD</h5>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function testAuth() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<div class="alert alert-info">Probando autenticación...</div>';
            
            let results = []; // Definir la variable results
            
            try {
                // Test 1: Obtener usuario actual
                const currentUserResult = await window.db.getCurrentUser();
                results.push({
                    test: 'Obtener Usuario Actual',
                    success: currentUserResult.success,
                    data: currentUserResult.success ? 'Usuario obtenido correctamente' : currentUserResult.error
                });

                // Test 2: Login con usuario de prueba (si existe)
                // Nota: Necesitarás crear un usuario en Supabase Auth primero
                const loginResult = await window.db.login('admin@casasvida.com', 'password123');
                results.push({
                    test: 'Login de Prueba',
                    success: loginResult.success,
                    data: loginResult.success ? 'Login exitoso' : 'Login fallido (esperado si no existe usuario)'
                });

                // Mostrar resultados
                let html = '<h5>Resultados de Tests de Autenticación:</h5>';
                results.forEach(result => {
                    const alertClass = result.success ? 'alert-success' : 'alert-warning';
                    const icon = result.success ? 'check-circle' : 'exclamation-circle';
                    html += `
                        <div class="alert ${alertClass}">
                            <i class="fas fa-${icon} me-2"></i>
                            <strong>${result.test}:</strong> ${result.data}
                        </div>
                    `;
                });
                
                resultsDiv.innerHTML = html;
                
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <h5><i class="fas fa-exclamation-triangle me-2"></i>Error en Autenticación</h5>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Auto-test al cargar la página
        window.addEventListener('load', () => {
            setTimeout(testConnection, 1000);
        });
    </script>
</body>
</html>
